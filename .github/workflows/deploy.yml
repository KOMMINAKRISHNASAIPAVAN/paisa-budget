name: Deploy to Netlify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: paisa-budget
        run: npm install

      - name: Build Angular app
        working-directory: paisa-budget
        run: npx ng build --configuration production

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --dir=paisa-budget/dist/paisa-budget/browser --site=${{ secrets.NETLIFY_SITE_ID }} --auth=${{ secrets.NETLIFY_AUTH_TOKEN }}
