server.port=${PORT:3000}

# ── MySQL ───────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?sslMode=REQUIRED&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP connection pool (prevents stale-connection warnings on TiDB Cloud) ─
spring.datasource.hikari.max-lifetime=180000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

# ── JPA ─────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ─────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:paisa_budget_super_secret_key_2026_must_be_32chars_min}
app.jwt.expiration-ms=604800000

# ── CORS ────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://komminakrishnasaipavan.github.io,http://localhost:4200}
